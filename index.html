<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>炎のCCNA 模擬試験</title>
<style>
  :root{
    --bg:#eef1f3; --panel:#ffffff; --panel2:#f4f6f8; --border:#cfd6dc;
    --fg:#20242a; --muted:#5a6671; --accent:#2f7bbf; --accent2:#1b4f7a;
    --ok:#2e8b57; --ng:#c0392b; --exam-head:#205a87;
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;font-size:14px;line-height:1.6}
  /* ===== ヘッダ（v1.0 本番Cisco風・紺ヘッダ） ===== */
  #appHeader{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;color:#eaf1f7;
    background:var(--exam-head);border-bottom:1px solid #16456b;padding:10px 18px;flex-wrap:wrap}
  #appHeader .brand{font-weight:600;color:#fff;letter-spacing:.02em;font-size:16px}
  #appHeader .sp{flex:1}
  #appHeader .ver{font-size:12px;color:#bcd6ea;border:1px solid #3f7aa6;border-radius:3px;padding:2px 8px}
  .wrap{max-width:980px;margin:0 auto;padding:18px 16px 40px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:18px 20px;margin:12px 0}
  .card h1{color:var(--accent2);margin:0 0 8px;font-weight:600;font-size:20px}
  .lead{color:var(--muted);margin:2px 0 0}
  .notice{background:var(--panel2);border:1px solid var(--border);border-left:4px solid var(--accent);
    border-radius:3px;padding:10px 12px;margin:12px 0;font-size:13px;color:#33414c}
  .small{font-size:12px;color:var(--muted)}
  /* ===== セットカード一覧 ===== */
  #cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:6px}
  .setcard{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:16px 16px 14px;
    display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .setcard h2{margin:0;font-size:16px;color:var(--accent2);font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:600;border-radius:3px;padding:2px 7px;letter-spacing:.02em}
  .badge.en{background:#e7f0f8;color:#1b4f7a;border:1px solid #b9d3e8}
  .badge.ja{background:#fdeee0;color:#9a5a12;border:1px solid #efcfa6}
  .setid{font-family:Consolas,monospace;font-size:11px;color:var(--muted)}
  .meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12.5px;color:#3a4650;margin:2px 0}
  .meta b{color:#20242a;font-weight:600}
  .filerow{font-family:Consolas,monospace;font-size:11px;color:var(--muted);word-break:break-all;
    background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:6px 8px}
  .actions{margin-top:auto;display:flex;align-items:center;gap:10px;padding-top:6px}
  a.btn,button.btn{background:var(--accent);color:#fff;text-decoration:none;border:1px solid #2a6ca8;border-radius:3px;
    padding:9px 20px;font-size:14px;font-weight:600;display:inline-block;font-family:inherit;cursor:pointer}
  a.btn:hover,button.btn:hover{background:#2a6ca8}
  button.btn.rand{background:var(--accent2);border-color:#16456b}
  button.btn.rand:hover{background:#16456b}
  #randRow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px}
  .missing{color:var(--ng);font-size:12px;font-weight:600}
  .err{display:none;background:#fbe9e7;border:1px solid #e6b0aa;border-left:4px solid var(--ng);
    border-radius:3px;padding:8px 12px;color:#8c2d22;font-size:13px;margin-top:6px}
  footer{max-width:980px;margin:0 auto;padding:8px 16px 30px;color:var(--muted);font-size:12px}
  code{font-family:Consolas,monospace;background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:1px 5px}
</style>
</head>
<body>

<div id="appHeader">
  <span class="brand">炎のCCNA 模擬試験</span><span class="ver">全20セット (v0.2)</span><span class="sp"></span>
</div>

<div class="wrap">
  <div class="card">
    <h1>セットを選んで開始</h1>
    <p class="lead">受けたいセットを選んで「開始」を押してください。試験は<b>新しいタブ</b>で開きます。</p>
    <div class="notice">各セットは <b>SIM 4問（各10点）＋ 選択 60問（各1点）＝ 100点満点 / 合格 90点 / 制限時間 100分</b>です。</div>
    <div id="randRow">
      <button class="btn rand" id="btnRandom" type="button">ランダム</button>
      <span class="small" id="randInfo">どれを受けるか迷ったら、1つを無作為に選んで開きます。</span>
    </div>
  </div>

  <div id="cards"></div>
  <div id="errBox" class="err"></div>
</div>

/* ------- 描画 ------- */
function esc(s){ return String(s).replace(/[&<>"]/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

function mins(sec){ return Math.round(sec/60); }

function render(){
  var host = document.getElementById('cards');
  var errs = [];
  var seenId = {}, seenFile = {};

  MANIFEST.forEach(function(s){
    // マニフェスト整合の軽い実行時チェック（検証ハーネスと二重化）
    if(seenId[s.setId]) errs.push('setId 重複: ' + s.setId);
    if(seenFile[s.file]) errs.push('file 重複: ' + s.file);
    seenId[s.setId] = true; seenFile[s.file] = true;

    var card = document.createElement('div');
    card.className = 'setcard';
    card.innerHTML =
      '<h2>' + esc(s.setName) + '</h2>' +
      '<div class="meta">' +
        '<span>SIM <b>' + s.sim + '</b> 問</span>' +
        '<span>選択 <b>' + s.select + '</b> 問</span>' +
        '<span>満点 <b>' + s.points + '</b> 点</span>' +
        '<span>合格 <b>' + s.pass + '</b> 点</span>' +
        '<span>制限 <b>' + mins(s.timeLimitSec) + '</b> 分</span>' +
      '</div>' +
      '<div class="actions">' +
        '<a class="btn" href="' + encodeURI(s.file) + '" target="_blank" rel="noopener">開始</a>' +
        '<span class="small">新しいタブで開きます</span>' +
      '</div>';
    host.appendChild(card);
  });

  if(errs.length){
    var box = document.getElementById('errBox');
    box.style.display = 'block';
    box.textContent = 'マニフェスト警告: ' + errs.join(' / ');
  }
}
render();

/* ------- ランダムで1セット開始 ------- */
function openSet(file){
  // 新規タブ起動（rel=noopener）。ユーザー操作内で実行するためポップアップブロックされない。
  var a = document.createElement('a');
  a.href = encodeURI(file); a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
(function(){
  var btn = document.getElementById('btnRandom');
  if(!btn || !MANIFEST.length) return;
  btn.addEventListener('click', function(){
    var pick = MANIFEST[Math.floor(Math.random() * MANIFEST.length)];
    document.getElementById('randInfo').textContent =
      '「' + pick.setName + '」を開きました。';
    openSet(pick.file);
  });
})();

</html>
